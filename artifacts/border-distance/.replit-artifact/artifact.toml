kind = "web"
previewPath = "/"
title = "Border Distance Calculator"
version = "1.0.0"
id = "artifacts/border-distance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20435

[services.development]
run = "pnpm --filter @workspace/border-distance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/border-distance", "run", "build" ]
publicDir = "artifacts/border-distance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20435"
BASE_PATH = "/"
