openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: countries
    description: Country operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /countries:
    get:
      operationId: listCountries
      tags: [countries]
      summary: List all available countries
      description: Returns a list of all country names available in the dataset
      responses:
        "200":
          description: List of country names
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryList"
  /countries/nearby:
    get:
      operationId: getCountriesNearby
      tags: [countries]
      summary: Find all countries at a given distance from a source country
      description: Returns all countries whose border is approximately the given number of km from the source country's border
      parameters:
        - name: country
          in: query
          required: true
          schema:
            type: string
          description: Name of the source country
        - name: km
          in: query
          required: true
          schema:
            type: number
          description: Target distance in kilometers
        - name: tolerance
          in: query
          required: false
          schema:
            type: number
            default: 50
          description: Tolerance in km (default 50). Countries within km ± tolerance are returned.
      responses:
        "200":
          description: Countries at approximately that distance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NearbyResult"
        "404":
          description: Source country not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CountryList:
      type: object
      properties:
        countries:
          type: array
          items:
            type: string
      required:
        - countries
    CountryMatch:
      type: object
      properties:
        name:
          type: string
          description: Country name
        distanceKm:
          type: number
          description: Actual border distance in km
        touching:
          type: boolean
          description: True if sharing a border
      required:
        - name
        - distanceKm
        - touching
    NearbyResult:
      type: object
      properties:
        sourceCountry:
          type: string
          description: Resolved name of the source country
        targetKm:
          type: number
          description: The requested distance in km
        tolerance:
          type: number
          description: The tolerance used in km
        matches:
          type: array
          items:
            $ref: "#/components/schemas/CountryMatch"
      required:
        - sourceCountry
        - targetKm
        - tolerance
        - matches
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
